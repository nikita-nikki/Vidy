openapi: 3.0.3
info:
  title: Vidy API
  description: |
    Complete RESTful API documentation for Vidy - A YouTube-like video hosting platform.
    
    ## Authentication
    Most endpoints require JWT authentication. Include the access token in cookies (automatically handled by browser) or as a Bearer token in the Authorization header.
    
    ## Base URL
    - Development: `http://localhost:8000/api/v1`
    - Production: `https://your-api-domain.com/api/v1`
    
    ## Response Format
    All API responses follow a consistent format:
    - **Success**: `{ statusCode, data, message, success: true }`
    - **Error**: `{ statusCode, message, success: false, errors: [] }`
  version: 1.0.0
  contact:
    name: API Support
    email: support@vidy.com
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC

servers:
  - url: http://localhost:8000/api/v1
    description: Development server
  - url: https://api.vidy.com/api/v1
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Users
    description: User authentication and profile management
  - name: Videos
    description: Video upload, retrieval, and management
  - name: Comments
    description: Comment management for videos and tweets
  - name: Likes
    description: Like/unlike functionality for videos, comments, and tweets
  - name: Subscriptions
    description: Channel subscription management
  - name: Playlists
    description: Playlist creation and management
  - name: Tweets
    description: Social media posts/tweets
  - name: Dashboard
    description: Channel analytics and statistics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  schemas:
    ApiResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        data:
          type: object
        message:
          type: string
          example: "Success"
        success:
          type: boolean
          example: true

    ApiError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: "Error message"
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          example: "johndoe"
        email:
          type: string
          format: email
          example: "john@example.com"
        fullName:
          type: string
          example: "John Doe"
        avatar:
          type: string
          format: uri
          example: "https://res.cloudinary.com/.../avatar.jpg"
        coverImage:
          type: string
          format: uri
          example: "https://res.cloudinary.com/.../cover.jpg"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Video:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439012"
        videoFile:
          type: string
          format: uri
          example: "https://res.cloudinary.com/.../video.mp4"
        thumbnail:
          type: string
          format: uri
          example: "https://res.cloudinary.com/.../thumb.jpg"
        title:
          type: string
          example: "My Awesome Video"
        description:
          type: string
          example: "This is a great video"
        duration:
          type: number
          example: 300
        views:
          type: integer
          example: 1000
        isPublished:
          type: boolean
          example: true
        owner:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439014"
        content:
          type: string
          example: "Great video!"
        video:
          type: string
          example: "507f1f77bcf86cd799439012"
        tweet:
          type: string
          example: "507f1f77bcf86cd799439018"
        owner:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - fullName
        - email
        - username
        - password
        - avatar
      properties:
        fullName:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        username:
          type: string
          example: "johndoe"
        password:
          type: string
          format: password
          example: "securePassword123"
        avatar:
          type: string
          format: binary
          description: Profile picture image file
        coverImage:
          type: string
          format: binary
          description: Cover image file (optional)

    LoginRequest:
      type: object
      required:
        - password
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        username:
          type: string
          example: "johndoe"
        password:
          type: string
          format: password
          example: "securePassword123"

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UpdateAccountRequest:
      type: object
      properties:
        fullName:
          type: string
          example: "John Updated"
        email:
          type: string
          format: email
          example: "newemail@example.com"

    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          format: password
          example: "oldPassword123"
        newPassword:
          type: string
          format: password
          example: "newPassword456"

    UploadVideoRequest:
      type: object
      required:
        - title
        - description
        - videoFile
        - thumbnail
      properties:
        title:
          type: string
          example: "My Awesome Video"
        description:
          type: string
          example: "This is a great video"
        videoFile:
          type: string
          format: binary
          description: Video file
        thumbnail:
          type: string
          format: binary
          description: Thumbnail image file

    UpdateVideoRequest:
      type: object
      properties:
        title:
          type: string
          example: "Updated Title"
        description:
          type: string
          example: "Updated description"
        thumbnail:
          type: string
          format: binary
          description: Updated thumbnail image

    CommentRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "This is a great video!"

    PlaylistRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "My Favorite Videos"
        description:
          type: string
          example: "Collection of my favorite videos"

    TweetRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "This is my tweet!"

    ChannelProfile:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        fullName:
          type: string
        avatar:
          type: string
          format: uri
        coverImage:
          type: string
          format: uri
        subscribersCount:
          type: integer
          example: 150
        channelsSubscribedToCount:
          type: integer
          example: 25
        isSubscribed:
          type: boolean
          example: false

    DashboardStats:
      type: object
      properties:
        totalVideos:
          type: integer
          example: 25
        totalViews:
          type: integer
          example: 50000
        totalSubscribers:
          type: integer
          example: 150
        totalLikes:
          type: integer
          example: 1200

security:
  - bearerAuth: []

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Check server health
      description: Returns the health status of the server
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "OK"
                          timestamp:
                            type: string
                            format: date-time

  /users/register:
    post:
      tags:
        - Users
      summary: Register a new user
      description: Create a new user account with avatar and optional cover image
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict - user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/login:
    post:
      tags:
        - Users
      summary: User login
      description: Authenticate user and receive access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Access and refresh tokens set as httpOnly cookies
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/logout:
    post:
      tags:
        - Users
      summary: User logout
      description: Logout user and clear refresh token
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/refresh-token:
    post:
      tags:
        - Users
      summary: Refresh access token
      description: Get a new access token using refresh token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/current-user:
    get:
      tags:
        - Users
      summary: Get current user
      description: Get details of the currently authenticated user
      responses:
        '200':
          description: User details retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /users/update-account:
    patch:
      tags:
        - Users
      summary: Update account details
      description: Update user's full name and/or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /users/avatar:
    patch:
      tags:
        - Users
      summary: Update user avatar
      description: Upload a new profile picture
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /users/cover-image:
    patch:
      tags:
        - Users
      summary: Update cover image
      description: Upload a new cover image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - coverImage
              properties:
                coverImage:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover image updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /users/c/{username}:
    get:
      tags:
        - Users
      summary: Get channel profile
      description: Get channel details including subscriber count
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Channel profile retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelProfile'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/history:
    get:
      tags:
        - Users
      summary: Get watch history
      description: Get user's video watch history
      responses:
        '200':
          description: Watch history retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Video'

  /users/change-password:
    post:
      tags:
        - Users
      summary: Change password
      description: Change user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Invalid old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /videos:
    get:
      tags:
        - Videos
      summary: Get all videos
      description: Retrieve videos with pagination, filtering, and sorting
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
        - name: query
          in: query
          schema:
            type: string
          description: Search query for title/description
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - name: sortType
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
        - name: userId
          in: query
          schema:
            type: string
          description: Filter videos by user ID
      responses:
        '200':
          description: Videos retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Video'

    post:
      tags:
        - Videos
      summary: Upload video
      description: Upload a new video with thumbnail
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadVideoRequest'
      responses:
        '200':
          description: Video uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Video'
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /videos/{videoId}:
    get:
      tags:
        - Videos
      summary: Get video by ID
      description: Get video details and increment view count
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
          example: "507f1f77bcf86cd799439012"
      responses:
        '200':
          description: Video retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Video'
        '404':
          description: Video not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    patch:
      tags:
        - Videos
      summary: Update video
      description: Update video title, description, or thumbnail
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateVideoRequest'
      responses:
        '200':
          description: Video updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Video'
        '403':
          description: Unauthorized - not the video owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      tags:
        - Videos
      summary: Delete video
      description: Delete a video (only by owner)
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Video deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Unauthorized - not the video owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /videos/toggle/publish/{videoId}:
    patch:
      tags:
        - Videos
      summary: Toggle publish status
      description: Toggle video publish/unpublish status
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Publish status toggled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Video'

  /comments/{videoId}:
    get:
      tags:
        - Comments
      summary: Get video comments
      description: Get all comments for a video with pagination
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'

    post:
      tags:
        - Comments
      summary: Add comment to video
      description: Add a new comment to a video
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '201':
          description: Comment added successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Comment'

  /comments/c/{commentId}:
    patch:
      tags:
        - Comments
      summary: Update comment
      description: Update a comment (only by owner)
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Comment updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Comment'
        '403':
          description: Unauthorized - not the comment owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      tags:
        - Comments
      summary: Delete comment
      description: Delete a comment (only by owner)
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Unauthorized - not the comment owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /comments/t/{tweetId}:
    get:
      tags:
        - Comments
      summary: Get tweet comments
      description: Get all comments for a tweet
      parameters:
        - name: tweetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tweet comments retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'

    post:
      tags:
        - Comments
      summary: Add comment to tweet
      description: Add a new comment to a tweet
      parameters:
        - name: tweetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '201':
          description: Comment added successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Comment'

  /likes/toggle/v/{videoId}:
    post:
      tags:
        - Likes
      summary: Toggle video like
      description: Like or unlike a video
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Like toggled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          liked:
                            type: boolean

  /likes/toggle/c/{commentId}:
    post:
      tags:
        - Likes
      summary: Toggle comment like
      description: Like or unlike a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Like toggled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
